<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; padding: 40px; }

.screenshots { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.frame {
  width: 430px;
  height: 932px;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.marketing {
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px 20px;
}
.marketing h2 {
  font-size: 28px;
  font-weight: 800;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 8px;
}
.marketing p {
  font-size: 16px;
  font-weight: 500;
  text-align: center;
  opacity: 0.7;
}

.app-screen {
  margin: 0 20px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  height: 680px;
}
.app-inner { height: 100%; overflow: hidden; padding: 16px 18px; }

:root {
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --text-primary: #2D2016;
  --text-secondary: #8C7B6B;
  --text-muted: #B5A899;
  --olive-bg: #EFF3E5;
  --olive: #6B8E5A;
}

/* 통계 헤더 */
.stats-header { padding: 8px 4px 16px; }
.stats-title { font-size: 24px; font-weight: 800; color: var(--text-primary); }
.stats-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* D-3 카드 (main 시각) */
.upcoming-card {
  background: var(--surface);
  border: 2px solid var(--olive);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
}
.upcoming-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.upcoming-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--olive);
}
.days-pill {
  background: var(--text-primary);
  color: var(--bg);
  font-size: 11px;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 999px;
}
.upcoming-desc {
  font-size: 11px;
  color: var(--text-secondary);
  margin-bottom: 14px;
}

/* 4팩 그리드 */
.packs-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.pack-cell {
  background: var(--bg);
  border: 1.5px solid transparent;
  border-radius: 12px;
  padding: 12px;
}
.pack-cell.selected {
  background: var(--olive-bg);
  border-color: var(--olive);
}
.pack-cell-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.pack-emoji { font-size: 22px; }
.pack-lock { font-size: 12px; color: var(--text-muted); font-weight: 700; }
.pack-cell.selected .pack-lock { color: var(--olive); }
.pack-name { font-size: 12px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.pack-icons { display: flex; gap: 3px; }
.pack-icon-mini { font-size: 13px; opacity: 0.75; }

.upcoming-footer {
  font-size: 11px;
  color: var(--olive);
  font-weight: 600;
  text-align: center;
  margin-top: 6px;
}

/* 작은 기본 통계 박스 */
.basic-stats {
  background: var(--surface);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.bs-item { flex: 1; text-align: center; }
.bs-num { font-size: 18px; font-weight: 800; color: var(--olive); }
.bs-label { font-size: 9px; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

@media (min-width: 1000px) {
  .frame { width: 1242px !important; height: 2688px !important; border-radius: 0 !important; }
  .marketing { height: 640px !important; padding: 116px 92px 58px !important; }
  .marketing h2 { font-size: 81px !important; line-height: 1.25 !important; margin-bottom: 23px !important; }
  .marketing p { font-size: 46px !important; }
  .app-screen { margin: 0 58px !important; border-radius: 70px !important; height: 1962px !important; }
  .app-inner { padding: 47px 52px !important; }
  .stats-header { padding: 23px 12px 46px !important; }
  .stats-title { font-size: 70px !important; }
  .stats-subtitle { font-size: 38px !important; margin-top: 6px !important; }
  .upcoming-card { border-width: 5px !important; border-radius: 52px !important; padding: 46px !important; margin-bottom: 40px !important; }
  .upcoming-head { margin-bottom: 17px !important; }
  .upcoming-label { font-size: 38px !important; }
  .days-pill { font-size: 32px !important; padding: 12px 29px !important; }
  .upcoming-desc { font-size: 32px !important; margin-bottom: 40px !important; }
  .packs-grid { gap: 23px !important; margin-bottom: 29px !important; }
  .pack-cell { border-width: 4px !important; border-radius: 35px !important; padding: 35px !important; }
  .pack-cell-top { margin-bottom: 17px !important; }
  .pack-emoji { font-size: 64px !important; }
  .pack-lock { font-size: 35px !important; }
  .pack-name { font-size: 35px !important; margin-bottom: 12px !important; }
  .pack-icons { gap: 9px !important; }
  .pack-icon-mini { font-size: 38px !important; }
  .upcoming-footer { font-size: 32px !important; margin-top: 17px !important; }
  .basic-stats { border-radius: 40px !important; padding: 35px !important; gap: 23px !important; margin-bottom: 40px !important; }
  .bs-num { font-size: 52px !important; }
  .bs-label { font-size: 26px !important; margin-top: 6px !important; }
}
</style>
</head>
<body>
<div class="screenshots"><div class="frame" style="background: #FFF8F0;">
  <div class="marketing">
    <h2 style="color: #2D2016;">골라 받는 <span style="color: #6B8E5A;">보상</span></h2>
    <p style="color: #8C7B6B;">마일스톤마다 받을 팩을 직접</p>
  </div>
  <div class="app-screen" style="background: var(--bg);">
    <div class="app-inner">
      <div class="stats-header">
        <div class="stats-title">통계</div>
        <div class="stats-subtitle">내 흐름</div>
      </div>

      <div class="basic-stats">
        <div class="bs-item"><div class="bs-num">3</div><div class="bs-label">습관</div></div>
        <div class="bs-item"><div class="bs-num">42</div><div class="bs-label">총 완료</div></div>
        <div class="bs-item"><div class="bs-num">18</div><div class="bs-label">최장 흐름</div></div>
        <div class="bs-item"><div class="bs-num">1/4</div><div class="bs-label">팩</div></div>
      </div>

      <div class="upcoming-card">
        <div class="upcoming-head">
          <div class="upcoming-label">🎁 다음 해금까지 3일</div>
          <div class="days-pill">D-3</div>
        </div>
        <div class="upcoming-desc">받을 팩을 미리 골라보세요</div>

        <div class="packs-grid">
          <div class="pack-cell selected">
            <div class="pack-cell-top">
              <span class="pack-emoji">🏃</span>
              <span class="pack-lock">✓</span>
            </div>
            <div class="pack-name">건강 팩</div>
            <div class="pack-icons">
              <span class="pack-icon-mini">🏋️</span>
              <span class="pack-icon-mini">🥗</span>
              <span class="pack-icon-mini">😴</span>
            </div>
          </div>
          <div class="pack-cell">
            <div class="pack-cell-top">
              <span class="pack-emoji">🦋</span>
              <span class="pack-lock">🔒</span>
            </div>
            <div class="pack-name">마음 팩</div>
            <div class="pack-icons">
              <span class="pack-icon-mini">✨</span>
              <span class="pack-icon-mini">📝</span>
              <span class="pack-icon-mini">🌙</span>
            </div>
          </div>
          <div class="pack-cell">
            <div class="pack-cell-top">
              <span class="pack-emoji">🎨</span>
              <span class="pack-lock">🔒</span>
            </div>
            <div class="pack-name">창작 팩</div>
            <div class="pack-icons">
              <span class="pack-icon-mini">✏️</span>
              <span class="pack-icon-mini">🎵</span>
              <span class="pack-icon-mini">📷</span>
            </div>
          </div>
          <div class="pack-cell">
            <div class="pack-cell-top">
              <span class="pack-emoji">🌳</span>
              <span class="pack-lock">🔒</span>
            </div>
            <div class="pack-name">자연 팩</div>
            <div class="pack-icons">
              <span class="pack-icon-mini">🌻</span>
              <span class="pack-icon-mini">🌷</span>
              <span class="pack-icon-mini">🍀</span>
            </div>
          </div>
        </div>

        <div class="upcoming-footer">✓ 건강 팩을 받기로 했어요</div>
      </div>
    </div>
  </div>
</div></div>
</body>
</html>
