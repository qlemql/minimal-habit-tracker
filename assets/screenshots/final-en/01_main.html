<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; padding: 40px; }

.screenshots { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }

/* 각 스크린샷 프레임: iPhone 6.7" 비율 (1290x2796 → 430x932 @1/3) */
.frame {
  width: 430px;
  height: 932px;
  border-radius: 40px;
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

/* 상단 마케팅 영역 */
.marketing {
  height: 220px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 32px 20px;
}
.marketing h2 {
  font-size: 28px;
  font-weight: 800;
  text-align: center;
  line-height: 1.3;
  margin-bottom: 8px;
}
.marketing p {
  font-size: 16px;
  font-weight: 500;
  text-align: center;
  opacity: 0.7;
}

/* 앱 화면 영역 */
.app-screen {
  margin: 0 20px;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  height: 680px;
}
.app-inner {
  height: 100%;
  overflow: hidden;
}

/* ============ 크림 테마 색상 ============ */
:root {
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-light: #FFF1E6;
  --text-primary: #2D2016;
  --text-secondary: #8C7B6B;
  --text-muted: #B5A899;
  --accent: #5B8C6A;
  --success: #4CAF50;
  --inactive: #EDE5DA;
}

/* ============ 앱 UI 컴포넌트 ============ */

/* 상태바 */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
}
.status-icons { display: flex; gap: 6px; align-items: center; font-size: 13px; }

/* 헤더 */
.app-header {
  padding: 4px 24px 16px;
}
.app-header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.greeting {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
}
.date {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-primary);
  margin-top: 2px;
}
.settings-btn {
  width: 40px;
  height: 40px;
  background: var(--surface);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

/* 프로그레스 바 */
.progress-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 14px;
}
.progress-bar-bg {
  flex: 1;
  height: 6px;
  background: var(--inactive);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.progress-text {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  min-width: 36px;
  text-align: right;
}

/* 습관 카드 */
.habit-card {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 16px;
  margin: 0 24px 10px;
  gap: 14px;
}
.habit-icon-circle {
  width: 44px;
  height: 44px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.habit-info {
  flex: 1;
}
.habit-name {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}
.habit-flow {
  font-size: 12px;
  font-weight: 500;
  margin-top: 2px;
}
.habit-check {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.habit-check.checked::after {
  content: '✓';
  color: white;
  font-weight: 700;
  font-size: 16px;
}
.habit-check.unchecked {
  border: 2.5px solid var(--inactive);
  background: transparent;
}

/* v1.1.1 새 디자인 — 체크박스 제거 + 아이콘 강조 + 알람 chip */
.habit-card.completed { background: #EFF3E5 !important; }
.habit-icon-circle { position: relative; }
.habit-icon-circle.olive-border {
  box-shadow: inset 0 0 0 1.5px #6B8E5A;
}
.check-overlay {
  position: absolute;
  bottom: -4px;
  right: -4px;
  width: 20px;
  height: 20px;
  border-radius: 10px;
  background: #6B8E5A;
  color: white;
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 2px solid #FFF8F0;
}
.reminder-chip {
  font-size: 11px;
  color: #8C7B6B;
  background: #F5F1EC;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: 500;
}

/* 빈 슬롯 카드 (3개 제약 visibility) */
.empty-slot-card {
  display: flex;
  align-items: center;
  padding: 16px;
  border-radius: 16px;
  margin: 0 24px 10px;
  gap: 14px;
  border: 1.5px dashed #B5A899;
  background: rgba(255, 255, 255, 0.3);
}
.empty-slot-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: rgba(181, 168, 153, 0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #B5A899;
  font-weight: 300;
  flex-shrink: 0;
}
.empty-slot-text {
  flex: 1;
  font-size: 14px;
  color: #B5A899;
  font-weight: 500;
}
.empty-slot-arrow {
  font-size: 18px;
  color: #B5A899;
  font-weight: 500;
}
@media (min-width: 1000px) {
  .empty-slot-card { padding: 46px !important; border-radius: 46px !important; margin: 0 72px 28px !important; gap: 40px !important; border-width: 4px !important; }
  .empty-slot-icon { width: 128px !important; height: 128px !important; border-radius: 40px !important; font-size: 64px !important; }
  .empty-slot-text { font-size: 36px !important; }
  .empty-slot-arrow { font-size: 48px !important; }
}

/* @media large mode 대응 (1242x2688) */
@media (min-width: 1000px) {
  .check-overlay { width: 60px !important; height: 60px !important; font-size: 32px !important; border-radius: 30px !important; border-width: 6px !important; bottom: -10px !important; right: -10px !important; }
  .reminder-chip { font-size: 30px !important; padding: 10px 24px !important; border-radius: 999px !important; }
  .habit-icon-circle.olive-border { box-shadow: inset 0 0 0 4px #6B8E5A !important; }
}

/* 주간 캘린더 */
.weekly-cal {
  margin: 16px 24px;
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
}
.weekly-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.weekly-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
}
.weekly-arrow {
  font-size: 16px;
  color: var(--text-muted);
}
.weekly-days {
  display: flex;
  justify-content: space-between;
}
.day-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  flex: 1;
}
.day-label {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 500;
}
.day-num {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary);
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 10px;
}
.day-num.today {
  background: var(--accent);
  color: white;
}
.day-dots {
  display: flex;
  gap: 3px;
  height: 8px;
}
.day-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* 하단 */
.bottom-text {
  text-align: center;
  padding: 20px;
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

/* 축하 오버레이 */
.celebrate-overlay {
  position: absolute;
  inset: 0;
  background: rgba(255,248,240,0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.celebrate-emoji { font-size: 64px; margin-bottom: 16px; }
.celebrate-title { font-size: 24px; font-weight: 800; color: var(--text-primary); margin-bottom: 8px; }
.celebrate-sub { font-size: 15px; color: var(--text-secondary); }

/* 컨페티 */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  opacity: 0.8;
}

/* 설정 화면 */
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
}
.settings-back {
  width: 36px;
  height: 36px;
  background: var(--surface);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-secondary);
  font-weight: 600;
}
.settings-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
}

.stats-card {
  display: flex;
  margin: 8px 24px 16px;
  background: var(--surface);
  border-radius: 16px;
  padding: 20px;
}
.stat-item {
  flex: 1;
  text-align: center;
}
.stat-num {
  font-size: 28px;
  font-weight: 700;
}
.stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}
.stat-divider {
  width: 1px;
  background: var(--surface-light);
  margin: 4px 0;
}

.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin: 16px 28px 8px;
}
.option-group {
  margin: 0 24px;
  background: var(--surface);
  border-radius: 14px;
  overflow: hidden;
}
.option-row {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 10px;
  border-bottom: 0.5px solid var(--surface-light);
}
.option-row:last-child { border-bottom: none; }
.option-icon { font-size: 18px; }
.option-text { flex: 1; font-size: 16px; color: var(--text-primary); }
.option-check {
  width: 22px;
  height: 22px;
  border-radius: 11px;
  background: var(--accent);
  color: white;
  font-size: 12px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}
.option-chevron { font-size: 18px; color: var(--text-muted); }

/* 습관 추가 화면 */
.add-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 24px;
}
.add-cancel { font-size: 16px; color: var(--text-secondary); }
.add-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.add-save { font-size: 16px; font-weight: 600; color: var(--accent); }

.add-preview {
  text-align: center;
  padding: 28px;
  margin: 0 24px;
  background: var(--surface);
  border-radius: 20px;
  margin-bottom: 20px;
}
.add-preview-icon {
  width: 80px;
  height: 80px;
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  margin: 0 auto 12px;
}
.add-preview-name {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-primary);
}

.add-section {
  margin: 0 24px 20px;
}
.add-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
  margin-left: 4px;
}
.add-input {
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 16px;
  font-size: 16px;
  color: var(--text-primary);
}

.icon-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.icon-item {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.icon-item.selected {
  border: 2.5px solid var(--accent);
  background: rgba(91,140,106,0.08);
}
.icon-item.locked {
  opacity: 0.35;
  position: relative;
}
.icon-item.locked::after {
  content: '🔒';
  font-size: 10px;
  position: absolute;
  right: 2px;
  bottom: 2px;
}

.color-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.color-item {
  width: 36px;
  height: 36px;
  border-radius: 18px;
  border: 3px solid transparent;
}
.color-item.selected {
  border-color: var(--text-primary);
  transform: scale(1.15);
}

/* 위젯 모형 */
.widget-mock {
  margin: 0 24px;
  background: var(--surface);
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.widget-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.widget-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
}
.widget-progress {
  font-size: 11px;
  font-weight: 700;
}
.widget-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
}
.widget-circle {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
}
.widget-circle.checked { color: white; font-weight: 700; }
.widget-circle.unchecked { font-size: 12px; }
.widget-name {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
}
.widget-name.completed {
  font-weight: 600;
}
.widget-flow {
  font-size: 11px;
  font-weight: 600;
}

/* 홈 화면 모형 */
.homescreen {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px 16px;
  padding: 20px 24px;
}
.hs-app {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.hs-icon {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.hs-label {
  font-size: 11px;
  color: var(--text-primary);
  text-align: center;
}

/* 번호 라벨 */
.screen-num {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.5);
  color: white;
  width: 28px;
  height: 28px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  z-index: 20;
}

<body>
<div class="screenshots"><div class="frame" style="background: #FFF8F0;">
